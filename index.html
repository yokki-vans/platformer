<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#17284f" />
  <title>Skyward Sprout — вертикальный аркадный прыгун</title>
  <link rel="stylesheet" href="styles.css?v=202605222032" />
</head>
<body>
  <div id="app" class="app-shell">
    <main class="game-shell" aria-label="Skyward Sprout game">
      <section id="canvasPanel" class="canvas-panel">
        <canvas id="gameCanvas" aria-label="Игровое поле Skyward Sprout" tabindex="0"></canvas>

        <div class="hud" aria-live="polite">
          <div class="hud-grid">
            <div class="hud-card"><span>Высота</span><strong id="heightValue">0 м</strong></div>
            <div class="hud-card"><span>Счёт</span><strong id="scoreValue">0</strong></div>
            <div class="hud-card"><span>Рекорд</span><strong id="bestValue">0</strong></div>
          </div>
          <div id="perkTray" class="perk-tray" aria-label="Активные бонусы"></div>
        </div>

        <div class="top-actions">
          <button id="pauseBtn" class="icon-btn" type="button" aria-label="Пауза">Ⅱ</button>
          <button id="muteBtn" class="icon-btn" type="button" aria-label="Звук">🔊</button>
        </div>

        <div id="screenOverlay" class="screen-overlay is-visible">
          <div class="screen-card">
            <p id="stateEyebrow" class="eyebrow">arcade vertical jumper</p>
            <h1 id="stateTitle">Skyward Sprout</h1>
            <p id="stateText">Прыгай всё выше по живым островкам, собирай орбы, включай бонусы и переживи опасные биомы.</p>
            <div id="stateStats" class="state-stats"></div>
            <button id="primaryAction" class="primary-btn" type="button">Начать</button>
            <p class="controls-hint">
              Desktop: ←/→ или A/D, Space/Enter — старт/рестарт, P — пауза.<br />
              Mobile: держи большие кнопки снизу.
            </p>
          </div>
        </div>
      </section>

      <section id="mobileControls" class="mobile-controls" aria-label="Мобильное управление">
        <button class="move-btn" data-dir="left" type="button" aria-label="Влево">◀</button>
        <button id="mobileJumpBtn" class="jump-btn" type="button" aria-label="Экстренный прыжок">◆</button>
        <button class="move-btn" data-dir="right" type="button" aria-label="Вправо">▶</button>
      </section>
    </main>
  </div>

  <script src="game.js?v=202605222032" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2D Платформер</title>
<style>
  body{margin:0;background:#1a1a2e;display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;padding:8px;box-sizing:border-box;}
  canvas{display:block;border:3px solid #444;border-radius:8px;box-shadow:0 0 30px rgba(0,150,255,.3);max-width:100%;height:auto;}
  .controls{display:none;margin-top:10px;width:100%;max-width:960px;justify-content:center;gap:20px;align-items:center;}
  .btn{width:80px;height:80px;border-radius:50%;border:3px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);color:#fff;font-size:24px;display:flex;justify-content:center;align-items:center;user-select:none;-webkit-user-select:none;touch-action:none;}
  .btn:active{background:rgba(255,255,255,.35);}
  .btn-sm{width:60px;height:60px;font-size:18px;border-radius:50%;border:3px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);color:#fff;display:flex;justify-content:center;align-items:center;user-select:none;-webkit-user-select:none;touch-action:none;}
  .btn-sm:active{background:rgba(255,255,255,.35);}
  @media (max-width:768px){.controls{display:flex;}}
</style>
</head>
<body style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;margin:0;padding:8px;">
<canvas id="gameCanvas" width="960" height="540" tabindex="0"></canvas>

<div class="controls">
  <div class="btn" data-key="ArrowLeft">◀</div>
  <div class="btn" data-key="Space">▲</div>
  <div class="btn" data-key="ArrowRight">▶</div>
  <div class="btn-sm" id="restartBtn" style="display:none;">🔄</div>
  <div class="btn-sm" id="nextLevelBtn" style="display:none;">➡️</div>
</div>

<script>
// Detect touch devices and show controls
(function() {
    var isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    if (isTouch) document.querySelector('.controls').style.display = 'flex';
})();

// Prevent page scroll on spacebar
window.addEventListener('keydown', e => {
    if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) {
        e.preventDefault();
    }
});
</script>

<script>
// ============================================================
// КОНСТАНТЫ И НАСТРОЙКИ
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

canvas.addEventListener('click', () => canvas.focus());

const GRAVITY       = 1800;
const MOVE_SPEED    = 350;
const JUMP_VELOCITY = -750;

// Максимально безопасный прыжок: за 0.42с игрок пролетает ~147px вправо
// Оставляем запас — максимальный разрыв между платформами = 260px
const MAX_GAP_WIDTH   = 260;
const MIN_GROUND_SEG  = 350;
const MAX_GROUND_SEG  = 550;

// Цветовые темы для уровней (генерируются процедурно)
const THEMES = [
  { name: '🌲 Лес',     sky:'#1a1a2e', ground:'#4a7c59', platform:'#6b8f71', player:'#3498db', enemy:'#e74c3c', coin:'#f1c40f', flag:'#2ecc71' },
  { name: '🏜️ Пустыня', sky:'#2d1b00', ground:'#c2873a', platform:'#d4a55a', player:'#5dade2', enemy:'#e67e22', coin:'#f9ca24', flag:'#badc58' },
  { name: '❄️ Лед',     sky:'#1a0a33', ground:'#88bdbc', platform:'#a8d8da', player:'#ff6b6b', enemy:'#6c5ce7', coin:'#fdcb6e', flag:'#00cec9' },
  { name: '🗼 Башня',   sky:'#2c3e50', ground:'#7f8c8d', platform:'#95a5a6', player:'#e74c3c', enemy:'#8e44ad', coin:'#f39c12', flag:'#2ecc71' },
  { name: '🔥 Финал',   sky:'#0d0d0d', ground:'#ff4757', platform:'#ff6b81', player:'#ffa502', enemy:'#2ed573', coin:'#eccc68', flag:'#ff4757' }
];

// ============================================================
// ПРОЦЕДУРНАЯ ГЕНЕРАЦИЯ УРОВНЯ (гарантия проходимости)
// ============================================================
let platforms = [];
let enemies   = [];
let coins     = [];
let flag      = null;
let WORLD_WIDTH = 2800;

/**
 * Генерирует проходимый уровень.
 * Алгоритм гарантирует, что каждый разрыв можно перепрыгнуть:
 *   - Максимальный разрыв между платформами ≤ MAX_GAP_WIDTH (260px)
 *   - Каждая платформа выше предыдущей не более чем на 150px
 *   - Платформы над пропастями всегда доступны для прыжка
 */
function generateLevel(levelIndex) {
    const theme = THEMES[levelIndex % THEMES.length];

    // Применяем цвета темы
    COLORS.sky       = theme.sky;
    COLORS.ground    = theme.ground;
    COLORS.platform  = theme.platform;
    COLORS.player    = theme.player;
    COLORS.enemy     = theme.enemy;
    COLORS.coin      = theme.coin;
    COLORS.flag      = theme.flag;

    // --- Генерация земли с разрывами (гарантия проходимости) ---
    platforms = [];
    let x = 0;
    const groundY = canvas.height - 40;
    const minGap = 120;   // минимальный разрыв
    const maxGap = MAX_GAP_WIDTH + 30; // чуть больше, но платформы над ним всегда будут

    // Стартовая платформа (всегда безопасная)
    platforms.push({ x: 0, y: groundY, w: MIN_GROUND_SEG, h: 40 });
    x += MIN_GROUND_SEG;

    const totalSegments = 8 + Math.floor(Math.random() * 5); // 8-12 сегментов земли

    for (let i = 0; i < totalSegments - 1; i++) {
        // Случайный разрыв, но не больше MAX_GAP_WIDTH + 30
        const gapSize = minGap + Math.random() * (maxGap - minGap);
        x += gapSize;

        const segWidth = MIN_GROUND_SEG + Math.random() * (MAX_GROUND_SEG - MIN_GROUND_SEG);
        platforms.push({ x: x, y: groundY, w: segWidth, h: 40 });
        x += segWidth;
    }

    // Финальная платформа (всегда широкая)
    const finalX = x + 200;
    platforms.push({ x: finalX, y: groundY, w: MAX_GROUND_SEG, h: 40 });
    WORLD_WIDTH = finalX + MAX_GROUND_SEG;

    // --- Генерация плавающих платформ (гарантия доступности) ---
    const floatPlatforms = [];

    // Для каждого разрыва на земле добавляем платформу над ним
    for (let i = 1; i < platforms.length - 1; i++) {
        const prevEnd = platforms[i - 1].x + platforms[i - 1].w;
        const currStart = platforms[i].x;

        if (currStart > prevEnd + 50) { // Если есть разрыв > 50px
            const gapCenter = prevEnd + (currStart - prevEnd) / 2;
            const floatY = groundY - 130 - Math.random() * 80; // высота над пропастью

            // Платформа всегда достаточно широкая для приземления
            const floatW = 90 + Math.random() * 60;
            floatPlatforms.push({ x: gapCenter - floatW / 2, y: floatY, w: floatW, h: 20 });

            // Иногда добавляем вторую платформу выше для сложности
            if (Math.random() < 0.4) {
                const higherY = floatY - 100;
                const higherX = gapCenter + (Math.random() - 0.5) * 80;
                floatPlatforms.push({ x: higherX, y: higherY, w: 70 + Math.random() * 40, h: 20 });
            }
        }
    }

    // Добавляем случайные платформы по всему уровню (не над разрывами)
    for (let i = 0; i < 6 + levelIndex; i++) {
        const px = 300 + Math.random() * (WORLD_WIDTH - 600);
        // Проверяем, что платформа не на земле и не дублирует существующую
        let tooClose = false;
        for (const fp of floatPlatforms) {
            if (Math.abs(px - fp.x) < 100 && Math.abs((groundY - 130 - Math.random() * 80) - fp.y) < 50) {
                tooClose = true; break;
            }
        }
        if (!tooClose) {
            const floatW = 70 + Math.random() * 60;
            floatPlatforms.push({ x: px, y: groundY - 140 - Math.random() * 120, w: floatW, h: 20 });
        }
    }

    platforms = platforms.concat(floatPlatforms);

    // --- Генерация врагов (только на платформах/земле) ---
    enemies = [];
    const enemyCount = 6 + levelIndex * 2; // Увеличиваем сложность с каждым уровнем

    for (let i = 0; i < enemyCount; i++) {
        // Выбираем случайную платформу или землю для врага
        const platIdx = Math.floor(Math.random() * platforms.length);
        const p = platforms[platIdx];

        if (p.y === groundY) {
            // На земле — патруль по сегменту
            const ex = p.x + 40 + Math.random() * (p.w - 80);
            const ey = groundY;
            enemies.push(new Enemy(ex, ey, p.x + 20, p.x + p.w - 60, 90 + levelIndex * 15));
        } else {
            // На платформе — патруль по ней
            const ex = p.x + 30 + Math.random() * (p.w - 60);
            const ey = p.y;
            enemies.push(new Enemy(ex, ey, p.x + 15, p.x + p.w - 45, 80 + levelIndex * 12));
        }
    }

    // --- Генерация монет (вдоль проходимого пути) ---
    coins = [];
    const coinCount = 10 + levelIndex * 3;

    for (let i = 0; i < coinCount; i++) {
        // Монеты размещаем на платформах или над ними
        if (Math.random() < 0.5) {
            // На платформе
            const platIdx = Math.floor(Math.random() * platforms.length);
            const p = platforms[platIdx];
            coins.push(new Coin(p.x + 30 + Math.random() * (p.w - 60), p.y - 30));
        } else {
            // Над платформой (для сбора в прыжке)
            const platIdx = Math.floor(Math.random() * platforms.length);
            const p = platforms[platIdx];
            coins.push(new Coin(p.x + 40 + Math.random() * (p.w - 80), p.y - 60));
        }
    }

    // --- Флаг победы на последней платформе ---
    flag = new Flag(WORLD_WIDTH - 120);
}

// ============================================================
const COLORS = {
  sky:       '#1a1a2e',
  ground:    '#4a7c59',
  platform:'#6b8f71',
  player:    '#3498db',
  enemy:     '#e74c3c',
  coin:      '#f1c40f',
  flag:      '#2ecc71',
  text:      '#ecf0f1'
};

// ============================================================
// УПРАВЛЕНИЕ
// ============================================================
const keys = {};
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space') audioCtx.resume();
});
window.addEventListener('keyup', e => { delete keys[e.code]; });

// ============================================================
// МОБИЛЬНОЕ УПРАВЛЕНИЕ (touch-кнопки)
// ============================================================
document.querySelectorAll('.btn').forEach(btn => {
    const key = btn.dataset.key;
    if (!key) return;
    btn.addEventListener('touchstart', e => {
        e.preventDefault();
        keys[key] = true;
        if (key === 'Space' && audioCtx.state === 'suspended') audioCtx.resume();
    }, { passive: false });
    btn.addEventListener('touchend', e => {
        e.preventDefault();
        delete keys[key];
    }, { passive: false });
    btn.addEventListener('mousedown', e => {
        keys[key] = true;
        if (key === 'Space' && audioCtx.state === 'suspended') audioCtx.resume();
    });
    btn.addEventListener('mouseup', e => { delete keys[key]; });
    btn.addEventListener('mouseleave', e => { delete keys[key]; });
});

// --- Кнопка перезапуска ---
const restartBtn = document.getElementById('restartBtn');
let restartHandled = false;
restartBtn.addEventListener('touchstart', e => {
    e.preventDefault(); e.stopPropagation();
    if (!restartHandled) {
        restartHandled = true;
        resetAll();
        setTimeout(() => { restartHandled = false; }, 300);
    }
}, { passive: false });
restartBtn.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    if (!restartHandled) {
        restartHandled = true;
        resetAll();
        setTimeout(() => { restartHandled = false; }, 300);
    }
});

// --- Кнопка "Следующий уровень" ---
const nextLevelBtn = document.getElementById('nextLevelBtn');
let nextHandled = false;
nextLevelBtn.addEventListener('touchstart', e => {
    e.preventDefault(); e.stopPropagation();
    if (!nextHandled) {
        nextHandled = true;
        advanceLevel();
        setTimeout(() => { nextHandled = false; }, 300);
    }
}, { passive: false });
nextLevelBtn.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    if (!nextHandled) {
        nextHandled = true;
        advanceLevel();
        setTimeout(() => { nextHandled = false; }, 300);
    }
});

// ============================================================
// ЗВУКОВАЯ СИСТЕМА (Web Audio API)
// ============================================================
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
    const osc  = audioCtx.createOscillator(),
          gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    let freq, dur;
    switch (type) {
        case 'jump':      freq=350; dur=.12; break;
        case 'coin':      freq=600; dur=.08; break;
        case 'gameover':  freq=120; dur=.6;  break;
        case 'win':       freq=500; dur=.4;  break;
        case 'levelup':   freq=700; dur=.3;  break;
        default: return;
    }
    osc.frequency.value = freq;
    osc.type = type === 'coin' ? 'triangle' : 'sine';
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
    osc.start();
    setTimeout(() => { osc.stop(); }, dur * 1000);
}

// ============================================================
// УТИЛИТЫ
// ============================================================
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function AABB(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x &&
           a.y < b.y + b.h && a.y + a.h > b.y;
}

// ============================================================
// КЛАСС ИГРОКА
// ============================================================
class Player {
  constructor(x, y) { this.init(x, y); }

  init(x, y) {
    this.x = x; this.y = y;
    this.w = 32; this.h = 48;
    this.vx = 0; this.vy = 0;
    this.onGround = false;
    this.facingRight = true;
    this.animTimer = 0;
  }

  update(dt) {
    if (keys['ArrowRight'] || keys['KeyD']) {
        this.vx = MOVE_SPEED;
        this.facingRight = true;
    } else if (keys['ArrowLeft'] || keys['KeyA']) {
        this.vx = -MOVE_SPEED;
        this.facingRight = false;
    } else {
        this.vx = 0;
    }

    const jumpPressed = keys['Space'] || keys['ArrowUp'] || keys['KeyW'];
    if (jumpPressed && this.onGround) {
        this.vy = JUMP_VELOCITY;
        this.onGround = false;
        playSound('jump');
    }

    this.vy += GRAVITY * dt;
    this.x  += this.vx * dt;
    this.y  += this.vy * dt;

    if (this.vx !== 0 && this.onGround) {
        this.animTimer += dt * 12;
    } else {
        this.animTimer = 0;
    }

    if (this.x < 0)              this.x = 0;
    if (this.x + this.w > WORLD_WIDTH) this.x = WORLD_WIDTH - this.w;
  }

  draw() {
    const x = Math.round(this.x), y = Math.round(this.y);
    const bobY = (this.vx !== 0 && this.onGround) ? Math.sin(this.animTimer) * 3 : 0;

    ctx.save();
    ctx.fillStyle = COLORS.player;
    ctx.fillRect(x, y + bobY, this.w, this.h);

    // Глаза
    ctx.fillStyle = '#fff';
    const eyeX = x + (this.facingRight ? 20 : 4);
    ctx.fillRect(eyeX, y + 10 + bobY, 8, 8);
    ctx.fillStyle = '#000';
    ctx.fillRect(this.facingRight ? eyeX + 5 : eyeX, y + 13 + bobY, 3, 4);

    // Ноги (анимация бега)
    if (this.vx !== 0 && this.onGround) {
        const legOffset = Math.sin(this.animTimer * 2) * 6;
        ctx.fillStyle = '#2980b9';
        ctx.fillRect(x + 4, y + this.h + bobY, 10, 6 + legOffset);
        ctx.fillRect(x + this.w - 14, y + this.h + bobY, 10, 6 - legOffset);
    }

    // Эффект прыжка
    if (!this.onGround && this.vy < 0) {
        ctx.fillStyle = 'rgba(52,152,219,.3)';
        for (let i = 1; i <= 3; i++) {
            ctx.fillRect(x + 4 * i, y + this.h + bobY - i * 8, 6, 6);
        }
    }

    ctx.restore();
  }
}

// ============================================================
// КЛАСС ВРАГА
// ============================================================
class Enemy {
  constructor(x, y, patrolMinX, patrolMaxX, speed) {
    this.startX = x; this.startY = y;
    this.init();
    this.patrolMin = patrolMinX;
    this.patrolMax = patrolMaxX;
    this.speed = speed || 80;
    this.w = 32; this.h = 32;
    this.animTimer = 0;
  }

  init() { this.x = this.startX; this.y = this.startY; this.dir = 1; }
  reset() { this.init(); }

  update(dt) {
    this.x += this.speed * this.dir * dt;
    if (this.x < this.patrolMin || this.x + this.w > this.patrolMax) {
        this.dir *= -1;
        this.x = clamp(this.x, this.patrolMin, this.patrolMax - this.w);
    }
    this.animTimer += dt * 8;
  }

  draw() {
    const x = Math.round(this.x), y = Math.round(this.y);
    const squish = 1 + Math.sin(this.animTimer) * 0.05;

    ctx.save();
    ctx.translate(x + this.w / 2, y + this.h);
    ctx.scale(1, squish);
    ctx.translate(-(x + this.w / 2), -(y + this.h));

    // Тело врага (красный шарик с шипами)
    ctx.fillStyle = COLORS.enemy;
    ctx.beginPath();
    ctx.arc(x + this.w / 2, y + this.h / 2, this.w / 2 - 2, 0, Math.PI * 2);
    ctx.fill();

    // Глаза (злые)
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(x + 10, y + 14, 5, 0, Math.PI * 2);
    ctx.arc(x + 22, y + 14, 5, 0, Math.PI * 2);
    ctx.fill();

    // Зрачки
    ctx.fillStyle = '#000';
    const pupilOff = this.dir > 0 ? 2 : -2;
    ctx.beginPath();
    ctx.arc(x + 10 + pupilOff, y + 15, 2.5, 0, Math.PI * 2);
    ctx.arc(x + 22 + pupilOff, y + 15, 2.5, 0, Math.PI * 2);
    ctx.fill();

    // Шипы сверху
    ctx.fillStyle = '#c0392b';
    for (let i = 0; i < 4; i++) {
        const sx = x + 6 + i * 7;
        ctx.beginPath();
        ctx.moveTo(sx, y);
        ctx.lineTo(sx + 3.5, y - 8);
        ctx.lineTo(sx + 7, y);
        ctx.fill();
    }

    ctx.restore();
  }
}

// ============================================================
// КЛАСС МОНЕТЫ
// ============================================================
class Coin {
  constructor(x, y) { this.x = x; this.y = y; this.r = 12; this.collected = false; this.animTimer = Math.random() * Math.PI * 2; }

  update(dt) { if (!this.collected) this.animTimer += dt * 5; }

  draw() {
    if (this.collected) return;
    const scale = 1 + Math.sin(this.animTimer) * 0.15;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.scale(scale, scale);

    ctx.beginPath();
    ctx.arc(0, 0, this.r, 0, Math.PI * 2);
    ctx.fillStyle = COLORS.coin;
    ctx.fill();
    ctx.strokeStyle = '#d4ac0d';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = '#b7950b';
    ctx.font = 'bold 12px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('$', 0, 4);

    ctx.restore();
  }
}

// ============================================================
// ФЛАГ ПОБЕДЫ
// ============================================================
class Flag {
  constructor(x) { this.x = x; this.y = canvas.height - 120; }

  draw() {
    // Столб
    ctx.fillStyle = '#7f8c8d';
    ctx.fillRect(this.x, this.y, 6, 120);

    const wave = Math.sin(Date.now() / 300) * 5;
    ctx.beginPath();
    ctx.moveTo(this.x + 6, this.y);
    ctx.lineTo(this.x + 70 + wave, this.y + 20);
    ctx.lineTo(this.x + 6, this.y + 40);
    ctx.closePath();
    ctx.fillStyle = COLORS.flag;
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.font = '16px Arial';
    ctx.fillText('★', this.x + 35, this.y + 28);
  }
}

// ============================================================
// ЧАСТИЦЫ
// ============================================================
let particles = [];

function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x, y,
            vx: (Math.random() - .5) * 120,
            vy: (Math.random() - 1) * 100,
            life: 1,
            color,
            size: Math.random() * 4 + 2
        });
    }
}

function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += GRAVITY * .3 * dt;
        p.life -= dt * 1.5;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function drawParticles() {
    for (const p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
}

// ============================================================
// ИГРОВОЕ СОСТОЯНИЕ + ПРОГРЕССИЯ УРОВНЕЙ
// ============================================================
let player;
let score     = 0;
let lives     = 3;
let gameState = 'playing';   // playing | gameover | won | allclear
let cameraOffset = 0;
let currentLevel = 0;        // текущий уровень (0-4)

function initGame() {
    generateLevel(currentLevel);
    player = new Player(80, canvas.height - 120);
    score = 0; lives = 3;
    gameState = 'playing';
    particles = [];
}

initGame();

// --- Переход на следующий уровень ---
function advanceLevel() {
    currentLevel++;
    if (currentLevel >= THEMES.length) {
        // Все уровни пройдены!
        gameState = 'allclear';
        playSound('win');
        spawnParticles(canvas.width / 2, canvas.height / 2, '#ffd700', 50);
        return;
    }
    initGame();
}

// --- Полный перезапуск ---
function resetAll() {
    currentLevel = 0;
    score = 0; lives = 3;
    generateLevel(0);
    player.init(80, canvas.height - 120);
    gameState = 'playing';
    particles = [];
}

// ============================================================
// ОБНОВЛЕНИЕ ФИЗИКИ И КОЛЛИЗИЙ
// ============================================================
function update(dt) {
    if (gameState !== 'playing') return;

    player.update(dt);
    enemies.forEach(e => e.update(dt));
    coins.forEach(c => c.update(dt));
    updateParticles(dt);

    // --- Коллизии игрока с платформами ---
    let landed = false;
    for (const p of platforms) {
        if (!AABB(player, p)) continue;

        const overlapTop = player.y + player.h - p.y;
        const overlapBot = p.y + p.h - player.y;

        if (overlapTop >= 0 && overlapTop < 30) {
            player.y = p.y - player.h;
            player.vy = 0;
            landed = true;
        } else if (overlapBot > 0 && overlapBot < 30 && player.vy < 0) {
            player.y = p.y + p.h;
            player.vy = 0;
        }

        if (player.vy > 0 && player.y + player.h >= p.y && !landed) {
            player.y = p.y - player.h;
            player.vy = 0;
            landed = true;
        }
    }

    if (landed && !player.onGround) {
        player.onGround = true;
    } else if (!landed && player.onGround) {
        player.onGround = false;
    }

    // --- Коллизии с врагами ---
    for (const e of enemies) {
        if (AABB(player, e)) {
            loseLife();
            break;
        }
    }

    // --- Сбор монет ---
    const px = player.x + player.w / 2;
    const py = player.y + player.h / 2;

    for (let i = coins.length - 1; i >= 0; i--) {
        const c = coins[i];
        if (c.collected) continue;

        const dx = px - c.x, dy = py - c.y;
        if (dx * dx + dy * dy < (c.r + 20) * (c.r + 20)) {
            c.collected = true;
            score += 10;
            playSound('coin');
            spawnParticles(c.x, c.y, COLORS.coin, 8);
        }
    }

    // --- Проверка флага победы ---
    if (player.x + player.w > flag.x) {
        gameState = 'won';
        playSound('win');
        spawnParticles(flag.x, flag.y, COLORS.flag, 30);
    }

    // --- Падение в пропасть ---
    if (player.y > canvas.height + 100) {
        loseLife();
    }

    // --- Камера ---
    cameraOffset = clamp(
        player.x + player.w / 2 - canvas.width * 0.4,
        0,
        WORLD_WIDTH - canvas.width
    );
}

// ============================================================
// ПОТЕРЯ ЖИЗНИ И ПЕРЕЗАПУСК
// ============================================================
function loseLife() {
    lives--;
    spawnParticles(player.x + player.w / 2, player.y + player.h / 2, '#e74c3c', 15);

    if (lives > 0) {
        resetPlayer();
    } else {
        playSound('gameover');
        gameState = 'gameover';
    }
}

function resetPlayer() {
    player.init(80, canvas.height - 120);
}

// ============================================================
// ОТРИСОВКА
// ============================================================
function render() {
    // --- Фон (градиент неба) ---
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, COLORS.sky);
    grad.addColorStop(1, '#1a1a2e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // --- Звёзды на фоне (параллакс) ---
    drawStars();

    ctx.save();
    ctx.translate(-cameraOffset, 0);

    // Платформы
    for (const p of platforms) {
        const isGround = p.y === canvas.height - 40;
        ctx.fillStyle = isGround ? COLORS.ground : COLORS.platform;
        ctx.fillRect(p.x, p.y, p.w, p.h);

        if (isGround) {
            ctx.fillStyle = '#5da87a';
            for (let gx = 0; gx < p.w; gx += 12) {
                const h = Math.random() * 6 + 4;
                ctx.fillRect(p.x + gx, p.y - h, 6, h);
            }
        } else {
            ctx.fillStyle = 'rgba(0,0,0,.2)';
            ctx.fillRect(p.x, p.y + p.h - 4, p.w, 4);
        }
    }

    flag.draw();
    coins.forEach(c => c.draw());
    enemies.forEach(e => e.draw());
    player.draw();
    drawParticles();

    ctx.restore();

    // --- UI (не зависит от камеры) ---
    ctx.fillStyle = COLORS.text;
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(`💰 Score: ${score}`, 15, 35);
    ctx.fillText(`❤️ Lives: ${lives}`, 15, 65);

    // Номер уровня
    const lvlNames = THEMES.map(t => t.name);
    ctx.fillStyle = 'rgba(255,255,255,.7)';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(`${lvlNames[currentLevel]} (${currentLevel + 1}/${THEMES.length})`, canvas.width / 2, 30);

    // Прогресс-бар уровня
    const progress = Math.min(player.x / (WORLD_WIDTH - 200), 1);
    ctx.fillStyle = 'rgba(255,255,255,.3)';
    ctx.fillRect(canvas.width - 220, 20, 200, 14);
    ctx.fillStyle = '#3498db';
    ctx.fillRect(canvas.width - 220, 20, 200 * progress, 14);

    // --- Экран Game Over / Победа / Все пройдено ---
    const restartBtnEl = document.getElementById('restartBtn');
    const nextLevelBtnEl = document.getElementById('nextLevelBtn');

    if (gameState === 'gameover') {
        ctx.fillStyle = 'rgba(0,0,0,.75)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.textAlign = 'center';
        ctx.font = 'bold 48px Arial';
        ctx.fillStyle = '#e74c3c';
        ctx.fillText('💀 Game Over', canvas.width / 2, canvas.height / 2 - 50);

        ctx.font = '24px Arial';
        ctx.fillStyle = '#ecf0f1';
        ctx.fillText(`Финальный счёт: ${score}`, canvas.width / 2, canvas.height / 2 + 5);

        ctx.font = '18px Arial';
        ctx.fillStyle = '#bdc3c7';
        ctx.fillText('Нажмите R для перезапуска', canvas.width / 2, canvas.height / 2 + 40);

        restartBtnEl.style.display = 'flex';
        nextLevelBtnEl.style.display = 'none';

    } else if (gameState === 'won') {
        ctx.fillStyle = 'rgba(0,0,0,.75)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.textAlign = 'center';
        ctx.font = 'bold 48px Arial';
        ctx.fillStyle = '#2ecc71';
        ctx.fillText('🏆 Уровень пройден!', canvas.width / 2, canvas.height / 2 - 50);

        ctx.font = '24px Arial';
        ctx.fillStyle = '#ecf0f1';
        ctx.fillText(`Счёт: ${score}`, canvas.width / 2, canvas.height / 2 + 5);

        if (currentLevel < THEMES.length - 1) {
            ctx.font = '18px Arial';
            ctx.fillStyle = '#bdc3c7';
            ctx.fillText('Нажмите Enter или кнопку ➡️ для следующего уровня', canvas.width / 2, canvas.height / 2 + 40);

            restartBtnEl.style.display = 'none';
            nextLevelBtnEl.style.display = 'flex';
        } else {
            // Последний уровень пройден — показываем полный рестарт
            ctx.font = '18px Arial';
            ctx.fillStyle = '#bdc3c7';
            ctx.fillText('Все уровни пройдены! Нажмите R для перезапуска', canvas.width / 2, canvas.height / 2 + 40);

            restartBtnEl.style.display = 'flex';
            nextLevelBtnEl.style.display = 'none';
        }

    } else if (gameState === 'allclear') {
        ctx.fillStyle = 'rgba(0,0,0,.8)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Конфетти-эффект
        for (let i = 0; i < 5; i++) {
            const cx = Math.random() * canvas.width;
            const cy = Math.random() * canvas.height;
            ctx.fillStyle = `hsl(${Math.random()*360},80%,60%)`;
            ctx.beginPath();
            ctx.arc(cx, cy, 5 + Math.random() * 5, 0, Math.PI * 2);
            ctx.fill();
        }

        ctx.textAlign = 'center';
        ctx.font = 'bold 52px Arial';
        ctx.fillStyle = '#ffd700';
        ctx.fillText('🎉 Поздравляем! 🎉', canvas.width / 2, canvas.height / 2 - 60);

        ctx.font = 'bold 36px Arial';
        ctx.fillStyle = '#fff';
        ctx.fillText('Все уровни пройдены!', canvas.width / 2, canvas.height / 2 + 5);

        ctx.font = '24px Arial';
        ctx.fillStyle = '#ecf0f1';
        ctx.fillText(`Общий счёт: ${score}`, canvas.width / 2, canvas.height / 2 + 45);

        ctx.font = '18px Arial';
        ctx.fillStyle = '#bdc3c7';
        ctx.fillText('Нажмите R для перезапуска', canvas.width / 2, canvas.height / 2 + 80);

        restartBtnEl.style.display = 'flex';
        nextLevelBtnEl.style.display = 'none';

    } else {
        // Играем — скрыть кнопки
        restartBtnEl.style.display = 'none';
        nextLevelBtnEl.style.display = 'none';
    }

    // Клавиша Enter для следующего уровня (десктоп)
    if (gameState === 'won' && currentLevel < THEMES.length - 1 && keys['Enter']) {
        advanceLevel();
    }
}

// --- Звёзды на фоне (параллакс-эффект) ---
let stars = [];
for (let i = 0; i < 80; i++) {
    stars.push({ x: Math.random() * WORLD_WIDTH, y: Math.random() * canvas.height * .6 });
}

function drawStars() {
    ctx.fillStyle = '#fff';
    for (const s of stars) {
        const parallaxX = s.x - cameraOffset * 0.3;
        if (parallaxX < 0 || parallaxX > canvas.width) continue;
        const twinkle = Math.sin(Date.now() / 500 + s.x) * .5 + .5;
        ctx.globalAlpha = twinkle;
        ctx.fillRect(parallaxX, s.y, 2, 2);
    }
    ctx.globalAlpha = 1;
}

// ============================================================
// ИГРОВОЙ ЦИКЛ
// ============================================================
let lastTime = performance.now();

function gameLoop(time) {
    const dt = Math.min((time - lastTime) / 1000, .05);
    lastTime = time;

    update(dt);
    render();

    requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
